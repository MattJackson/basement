name: Integration

# Real-Garage integration tests against pinned Garage v1 (1.0.1) and
# v2 (2.0.0) images via testcontainers-go.
#
# Why a separate workflow:
#   - The default `go test ./...` path (CI's main gate) must stay
#     fast + Docker-free. Integration tests spin containers and take
#     ~30-60s each — too slow for every push.
#   - The `integration` build tag isolates this code so only the
#     dedicated workflow ever compiles testcontainers + the per-driver
#     integration suites.
#
# Triggers: every PR + every push to main, but only when the diff
# touches a path likely to break a real-Garage interaction (drivers,
# federation, the affected admin handlers). PRs that touch only docs
# or frontend skip the gate.
#
# Bug-class coverage rationale (the v1.11.0.x sub-cycle):
#   - v1.11.0.1 — admin-only Garage v2 driver returned DRIVER_BUILD_FAILED
#   - v1.11.0.2 — per-cluster bucket handlers used wrong driver
#   - v1.11.0.5 BUG02 — Garage v2 dropped per-bucket grants on GetKey
#   - v1.11.0.4 — federation engine no-op replication under second-precision
#
# Every one of these would have been caught BEFORE deploy by these
# tests. Past-and-future cycles preserve that gate.

on:
  pull_request:
    paths:
      - 'internal/drivers/**'
      - 'internal/driver/**'
      - 'internal/api/admin_buckets*.go'
      - 'internal/api/admin_keys*.go'
      - 'internal/federation/**'
      - 'internal/federationwire/**'
      - '.github/workflows/integration.yml'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]
    paths:
      - 'internal/drivers/**'
      - 'internal/driver/**'
      - 'internal/api/admin_buckets*.go'
      - 'internal/api/admin_keys*.go'
      - 'internal/federation/**'
      - 'internal/federationwire/**'
      - '.github/workflows/integration.yml'
      - 'go.mod'
      - 'go.sum'
  # Allow manual dispatch so we can verify a green run on demand
  # without pushing a noisy commit.
  workflow_dispatch:

# Single-flight per branch so a rapid push series doesn't queue
# multiple identical container-heavy runs.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  garage-v2:
    name: Garage v2 driver
    runs-on: ubuntu-latest
    # GHA's ubuntu-latest image ships Docker pre-installed +
    # the daemon already running, so testcontainers-go connects
    # without extra setup.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Pre-pull Garage v2 image
        # Pull explicitly so testcontainers' bootstrap doesn't race the
        # registry on a cold runner — the wait timeout inside the test
        # is for "Garage admin opens 3903" not "Docker pulls 50MB".
        run: docker pull dxflrs/garage:v2.0.0

      - name: Run Garage v2 integration tests
        run: go test -tags=integration -timeout=10m -race -v ./internal/drivers/garage/...

  garage-v1:
    name: Garage v1 driver
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Pre-pull Garage v1 image
        run: docker pull dxflrs/garage:v1.0.1

      - name: Run Garage v1 integration tests
        run: go test -tags=integration -timeout=10m -race -v ./internal/drivers/garage_v1/...

  federation:
    name: Federation engine (2x Garage v2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Pre-pull Garage v2 image
        # Federation test spins TWO containers from the same image;
        # one pull serves both.
        run: docker pull dxflrs/garage:v2.0.0

      - name: Run federation integration test
        run: go test -tags=integration -timeout=15m -race -v ./internal/federation/...
