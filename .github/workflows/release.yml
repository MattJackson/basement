name: Release

# Fast dev cycle: amd64-only, no separate CI/lint gate (run locally
# before tagging). When we want to ship a "stable" multi-arch release,
# revisit — add arm64 + lint+test job back, or split into a separate
# release-stable.yml triggered on vX.Y.Z (no patch suffix).

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/basement
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }},pattern=^[0-9]+\.[0-9]+\.[0-9]+$

      - name: Build and push (amd64-only for dev speed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILT_AT=${{ github.event.repository.updated_at }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cycle v1.11.0.12 — image vulnerability scan after publish.
      # Critical/High block the release. Medium/Low are reported but
      # do not fail. See docs/security-audit-baseline.md for the
      # baseline + suppression policy.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/basement:${{ github.ref_name }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
        continue-on-error: true  # warn-mode for first cycle; flip after baseline scan

