version: 2

# Dependabot — weekly batched PRs for Go modules, npm packages,
# Docker base images, and GitHub Actions versions. Cycle v1.11.0.12.
#
# Grouping keeps the PR noise low: one PR per ecosystem per week,
# bundling all updates the scheduler emits in that window.

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      gh-actions:
        patterns:
          - "*"
