# basement — Docker Compose reference deployment
#
# Two services: basement (admin UI) + caddy (TLS termination).
# Garage is assumed to be already running on a reachable network — this
# is the typical operator scenario; basement is added alongside an
# existing Garage cluster.
#
# Quickstart:
#   1. cp .env.example .env
#   2. Fill in every CHANGE_ME value in .env (see comments there)
#   3. docker compose up -d
#   4. Visit https://basement.example.com (replace with your hostname)
#
# Full configuration reference: ../docs/configuration.md
# Reverse-proxy gotchas (S3 Host header preservation): ./Caddyfile

services:
  basement:
    image: ghcr.io/mattjackson/basement:latest
    container_name: basement
    restart: unless-stopped
    networks:
      - default
      # Attach to the same network as your existing garage container.
      # CHANGE_ME: rename "garage_default" if your Garage compose uses a
      # different network name. Run `docker network ls` to find it.
      - garage_default
    environment:
      # --- Required ---
      BASEMENT_DRIVER: garage
      BASEMENT_DRIVER_GARAGE_ADMIN_URL: ${BASEMENT_DRIVER_GARAGE_ADMIN_URL}
      BASEMENT_DRIVER_GARAGE_ADMIN_TOKEN: ${BASEMENT_DRIVER_GARAGE_ADMIN_TOKEN}
      BASEMENT_DRIVER_GARAGE_S3_URL: ${BASEMENT_DRIVER_GARAGE_S3_URL}
      BASEMENT_DRIVER_GARAGE_S3_REGION: ${BASEMENT_DRIVER_GARAGE_S3_REGION:-garage}
      BASEMENT_DRIVER_GARAGE_S3_ACCESS_KEY: ${BASEMENT_DRIVER_GARAGE_S3_ACCESS_KEY}
      BASEMENT_DRIVER_GARAGE_S3_SECRET_KEY: ${BASEMENT_DRIVER_GARAGE_S3_SECRET_KEY}
      BASEMENT_ADMIN_USER: ${BASEMENT_ADMIN_USER:-admin}
      BASEMENT_ADMIN_PASSWORD_HASH: ${BASEMENT_ADMIN_PASSWORD_HASH}
      BASEMENT_JWT_SECRET: ${BASEMENT_JWT_SECRET}
      # --- Optional ---
      BASEMENT_LISTEN: ":8080"
      BASEMENT_DATA_DIR: /var/lib/basement
      BASEMENT_LOG_LEVEL: ${BASEMENT_LOG_LEVEL:-info}
      BASEMENT_SESSION_TTL: 24h
      BASEMENT_AUDIT_RETENTION_DAYS: "90"
      BASEMENT_PUBLIC_URL: ${BASEMENT_PUBLIC_URL}
    volumes:
      - basement-data:/var/lib/basement
    labels:
      # Watchtower auto-updates basement when a new :latest is pushed.
      com.centurylinklabs.watchtower.enable: "true"

  caddy:
    image: caddy:2
    container_name: basement-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      # Hostnames the Caddyfile substitutes; matches what you set DNS for.
      BASEMENT_HOSTNAME: ${BASEMENT_HOSTNAME}
      S3_HOSTNAME: ${S3_HOSTNAME}
      GARAGE_S3_UPSTREAM: ${GARAGE_S3_UPSTREAM}
    depends_on:
      - basement

volumes:
  basement-data:
  caddy-data:
  caddy-config:

networks:
  garage_default:
    external: true
