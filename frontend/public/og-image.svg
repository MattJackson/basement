<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="geometricPrecision">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F4ECDD"/>

  <!-- Subtle dotted texture (a few stray "stuff" hints) -->
  <g opacity="0.08" fill="#2B1810">
    <circle cx="90" cy="80" r="6"/>
    <circle cx="1100" cy="120" r="4"/>
    <circle cx="1140" cy="540" r="6"/>
    <circle cx="80" cy="560" r="5"/>
    <circle cx="180" cy="160" r="3"/>
    <circle cx="1050" cy="500" r="3"/>
  </g>

  <!-- ========== ICON, scaled and positioned on left ========== -->
  <g transform="translate(80, 90) scale(0.88)">
    <rect width="512" height="512" rx="96" fill="#F4ECDD" stroke="#2B1810" stroke-width="6"/>
    <path d="M 55 250 L 55 420 L 175 445 L 175 275 Z"
          fill="#8A5530" stroke="#2B1810" stroke-width="16" stroke-linejoin="round"/>
    <path d="M 55 250 L 130 232 L 175 275 Z"
          fill="#6B3F22" stroke="#2B1810" stroke-width="16" stroke-linejoin="round"/>
    <rect x="130" y="245" width="300" height="215"
          fill="#C9874B" stroke="#2B1810" stroke-width="20" stroke-linejoin="round" rx="4"/>
    <path d="M 130 245 L 60 165 L 240 140 L 280 220 Z"
          fill="#D89C5E" stroke="#2B1810" stroke-width="20" stroke-linejoin="round"/>
    <path d="M 430 245 L 500 165 L 320 140 L 280 220 Z"
          fill="#B8773F" stroke="#2B1810" stroke-width="20" stroke-linejoin="round"/>
    <circle cx="280" cy="195" r="42" fill="#E8B872" stroke="#2B1810" stroke-width="16"/>
    <rect x="190" y="340" width="180" height="70" fill="#F4ECDD" stroke="#2B1810" stroke-width="10"/>
    <line x1="210" y1="368" x2="350" y2="368" stroke="#2B1810" stroke-width="8" stroke-linecap="round"/>
    <line x1="210" y1="390" x2="320" y2="390" stroke="#2B1810" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- ========== WORDMARK + TAGLINE on right ========== -->
  <g transform="translate(620, 230)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#2B1810">Basement</text>
    <text x="0" y="58" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="34" fill="#6B3F22">toss your stuff here.</text>
    <text x="0" y="102" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="34" fill="#6B3F22">forget about it.</text>
    <!-- Underline accent -->
    <line x1="0" y1="140" x2="200" y2="140" stroke="#2B1810" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#2B1810">a friendly UI for Garage S3</text>
  </g>
</svg>
