<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basement</title>
    <meta name="description" content="Toss your stuff here. Forget about it. A friendly UI for Garage S3." />

    <!-- Primary favicon (SVG, scales perfectly, auto-inverts on dark mode) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fallback for older browsers / Windows -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA manifest (v1.8.0e: vite-plugin-pwa emits manifest.webmanifest;
         /site.webmanifest is kept for back-compat with already-installed
         PWAs that registered against it). -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Mobile browser address-bar color -->
    <meta name="theme-color" content="#C9874B" />

    <!-- v1.8.0e: iOS-specific PWA hints. Safari ignores the web
         manifest's display:standalone — it requires these meta tags
         instead to render the "Add to Home Screen" install in
         standalone mode (no Safari chrome). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Basement" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph social card -->
    <meta property="og:title" content="Basement" />
    <meta property="og:description" content="Toss your stuff here. Forget about it. A friendly UI for Garage S3." />
    <meta property="og:image" content="https://basement.pq.io/og-image.png" />
    <meta property="og:url" content="https://basement.pq.io" />
    <meta property="og:type" content="website" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Basement" />
    <meta name="twitter:description" content="Toss your stuff here. Forget about it. A friendly UI for Garage S3." />
    <meta name="twitter:image" content="https://basement.pq.io/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
