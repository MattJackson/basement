<!doctype html>
<html lang="en">
  <head>

    <title>Basement</title>
    <meta name="description" content="Toss your stuff here. Forget about it. A friendly UI for Garage S3." />

    <!-- Primary favicon (SVG, scales perfectly, auto-inverts on dark mode) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fallback for older browsers / Windows -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Mobile browser address-bar color -->
    <meta name="theme-color" content="#C9874B" />

    <!-- Open Graph social card -->
    <meta property="og:title" content="Basement" />
    <meta property="og:description" content="Toss your stuff here. Forget about it. A friendly UI for Garage S3." />
    <meta property="og:image" content="https://basement.pq.io/og-image.png" />
    <meta property="og:url" content="https://basement.pq.io" />
    <meta property="og:type" content="website" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Basement" />
    <meta name="twitter:description" content="Toss your stuff here. Forget about it. A friendly UI for Garage S3." />
    <meta name="twitter:image" content="https://basement.pq.io/og-image.png" />
