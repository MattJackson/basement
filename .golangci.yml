version: "2"

run:
  timeout: 5m

linters:
  default: none
  # errcheck disabled for v0.1 — most violations are json.Encode/Decode
  # against ResponseWriter where errors are rare and not actionable.
  # Re-enable in v0.2 after a one-shot lint-cleanup pass.
  enable:
    - govet
    - staticcheck
    - revive
    - ineffassign
    - unused

  exclusions:
    paths:
      - internal/web/dist
      - frontend
