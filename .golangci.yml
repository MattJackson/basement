version: "2"

run:
  timeout: 5m

linters:
  default: none
  # Minimal set for v0.1 ship: catch real bugs, defer style cleanup.
  # v0.2 should re-enable errcheck + revive + add a one-shot godoc
  # comment pass on all exported symbols.
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused

  exclusions:
    paths:
      - internal/web/dist
      - frontend
