            type: string
        responses:
          '200':
            description: Bucket deleted successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Bucket deleted
          '400':
            description: 'X-Confirm-Delete header missing (`CONFIRMATION_REQUIRED`),

              malformed/expired (`CONFIRMATION_INVALID`), or bound to a

              different bucket/user (`CONFIRMATION_MISMATCH`).

