      delete:
        operationId: deleteBucketByCluster
        summary: Delete a bucket (token-confirmed) within a specific connection
        description: 'Deletes a storage bucket and all its associated data. Fails

          if the bucket is not empty (zero objects). Also deletes all

          aliases (global and per-key) associated with the bucket.


          **Two-phase confirmation:** the client must first POST to

