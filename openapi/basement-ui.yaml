          and pagination via continuation token. Returns object keys, sizes, and last
          modified timestamps. RBAC-checked against user's grants — only returns objects
          within the user's granted prefix scope. Used by end-user Browse screen.
        tags:
        - DataPlane
        security:
        - cookieAuth: []
        parameters:
        - name: bucket
          in: path
          required: true
          description: Bucket name or ID
          schema:
            type: string
        - name: prefix
          in: query
          description: Filter objects by key prefix (folder-like)
          required: false
          schema:
            type: string
        - name: continuation
          in: query
          description: Pagination token from previous response
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of objects to return (default 1000)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1000
        responses:
          '200':
            description: List of objects with pagination token
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ObjectPage'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: User lacks list permission for this bucket/prefix
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Bucket not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /buckets/{bucket}/objects/{key+}:
      delete:
        operationId: deleteObject
        summary: Delete an object (data plane)
        description: Deletes a specific object from the bucket. Requires write permission
          for the bucket/prefix. For multipart uploads, use the dedicated abort endpoint
          instead. Used by end-user Browse screen on file delete action.
        tags:
        - DataPlane
        security:
        - cookieAuth: []
        parameters:
        - name: bucket
          in: path
          required: true
          description: Bucket name or ID
          schema:
            type: string
        - name: key+
          in: path
          required: true
          description: Object key (supports splat for nested paths)
          schema:
            type: string
        responses:
          '200':
            description: Object deleted successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Object deleted
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: User lacks write permission for this object
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Object not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Internal server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /buckets/{bucket}/objects/{key+}/presign-get:
      post:
        operationId: presignObjectGet
        summary: Get presigned URL for object download (data plane)
        description: Returns a presigned GET URL for downloading an object. The caller
          specifies the desired TTL (default 300 seconds, min 60, max 86400). The returned
          URL can be used directly to download the object without further authentication.
          RBAC-checked against user's grants — requires read permission for the bucket/prefix.
          Used by end-user Browse screen on file download action.
        tags:
        - DataPlane
        security:
        - cookieAuth: []
        parameters:
        - name: bucket
          in: path
          required: true
          description: Bucket name or ID
          schema:
            type: string
        - name: key+
          in: path
          required: true
          description: Object key (supports splat for nested paths)
          schema:
            type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignRequest'
        responses:
          '200':
            description: Presigned URL generated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/PresignedURL'
          '400':
            description: Invalid request (e.g., TTL out of range)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: User lacks read permission for this object
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Object not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Internal server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /buckets/{bucket}/objects/{key+}/presign-put:
      post:
        operationId: presignObjectPut
        summary: Get presigned URL for object upload (data plane)
        description: Returns a presigned PUT URL for uploading an object. The caller
          specifies the desired TTL (default 300 seconds, min 60, max 86400) and optional
          content type. The returned URL can be used directly to upload an object without
          further authentication. RBAC-checked against user's grants — requires write
          permission for the bucket/prefix. Used by end-user Upload screen for single-file
          uploads.
        tags:
        - DataPlane
        x-basement-since: '1.2'
        security:
        - cookieAuth: []
        parameters:
        - name: bucket
          in: path
          required: true
          description: Bucket name or ID
          schema:
            type: string
        - name: key+
          in: path
          required: true
          description: Object key (supports splat for nested paths)
          schema:
            type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignRequest'
        responses:
          '200':
            description: Presigned URL generated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/PresignedURL'
          '400':
            description: Invalid request (e.g., TTL out of range, missing contentType)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: User lacks write permission for this bucket/prefix
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '500':
            description: Internal server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /buckets/{bucket}/objects/{key+}/stat:
      get:
        operationId: statObject
        summary: Get object metadata (data plane)
        description: Returns detailed metadata about a specific object including size,
          content type, last modified timestamp, and ETag. Does not return object data
          itself. RBAC-checked against user's grants — requires read permission for
          the bucket/prefix. Used by end-user Browse screen file info panel.
        tags:
        - DataPlane
        security:
        - cookieAuth: []
        parameters:
        - name: bucket
          in: path
          required: true
          description: Bucket name or ID
          schema:
            type: string
        - name: key+
          in: path
          required: true
          description: Object key (supports splat for nested paths)
          schema:
            type: string
        responses:
          '200':
            description: Object metadata
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ObjectInfo'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: User lacks read permission for this object
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Object not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /capabilities:
      get:
        operationId: getCapabilities
        summary: Get driver capabilities
        description: Returns the capabilities of the underlying backend driver. Frontend
          uses this to feature-flag UI sections based on what the driver supports.
        tags:
        - Capabilities
        security:
        - cookieAuth: []
        responses:
          '200':
            description: Driver capabilities
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Caps'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /health:
      get:
        operationId: healthCheck
        summary: Health probe
        description: Liveness probe for basement. Returns 200 OK if the server can
          answer requests.
        tags:
        - Capabilities
        responses:
          '200':
            description: Server is healthy and able to handle requests
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/HealthReport'
  /user/shares:
      post:
        operationId: createShare
        summary: Create a share link (v1.2+)
        description: Creates a share link for an object with optional password protection
          and TTL. Returns the share token that can be used in public URLs like https://basement.example.com/share/<token>.
          Used by end-user Shares screen.
        tags:
        - Shares
        x-basement-since: '1.2'
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareCreateRequest'
        responses:
          '201':
            description: Share link created successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Share'
          '400':
            description: Invalid share specification (e.g., invalid TTL)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      get:
        operationId: listShares
        summary: List my shares (v1.2+)
        description: Returns all share links created by the current user, including
          their status (active/expired/revoked), expiration times, and access counts.
          Used by end-user Shares screen.
        tags:
        - Shares
        x-basement-since: '1.2'
        security:
        - cookieAuth: []
        responses:
          '200':
            description: List of shares
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Share'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /user/shares/{token}:
      delete:
        operationId: revokeShare
        summary: Revoke a share link (v1.2+)
        description: Revokes a share link, preventing further access. The token becomes
          invalid immediately and any recipients attempting to use it will receive an
          error. Used by end-user Shares screen to manage active shares.
        tags:
        - Shares
        x-basement-since: '1.2'
        security:
        - cookieAuth: []
        parameters:
        - name: token
          in: path
          required: true
          description: Share token to revoke
          schema:
            type: string
        responses:
          '200':
            description: Share link revoked successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Share link revoked
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Share not found (already expired or revoked)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /share/{token}/info:
      get:
        operationId: shareInfo
        summary: Get share info (v1.3+)
        description: Returns minimal share information for public access — requiresPassword, expired, revoked, isDirectory, displayName. No actual content exposed. Used by the public /share/$token route to determine what UI to render.
        tags:
        - Shares
        x-basement-since: '1.3'
        security: []
        parameters:
        - name: token
          in: path
          required: true
          description: Share token
          schema:
            type: string
        responses:
          '200':
            description: Share info
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ShareInfoResponse'
          '401':
            description: Password required but not provided
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Share not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '410':
            description: Share has been revoked or expired
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /share/{token}/auth:
      post:
        operationId: shareAuth
        summary: Authenticate for password-protected share (v1.3+)
        description: Validates password for a password-protected share and sets a scoped session cookie. On success, the client can access /share/{token}/list and /share/{token}/get endpoints. Returns 400 if no password is required.
        tags:
        - Shares
        x-basement-since: '1.3'
        security: []
        parameters:
        - name: token
          in: path
          required: true
          description: Share token
          schema:
            type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  password:
                    type: string
                    format: password
        responses:
          '200':
            description: Authenticated successfully, cookie set
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Authenticated
          '400':
            description: No password required for this share
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: Invalid password
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Share not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '410':
            description: Share has been revoked or expired
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /share/{token}/list:
      get:
        operationId: shareList
        summary: List objects in a prefix share (v1.3+)
        description: Lists objects under the share's prefix for authenticated public access. Requires password cookie if share is password-protected. Returns paginated list of objects with continuation token. For object shares, returns 404 SHARE_IS_SINGLE_OBJECT.
        tags:
        - Shares
        x-basement-since: '1.3'
        security: []
        parameters:
        - name: token
          in: path
          required: true
          description: Share token
          schema:
            type: string
        - name: prefix
          in: query
          required: false
          description: Sub-prefix to list within the share's prefix
          schema:
            type: string
        responses:
          '200':
            description: List of objects
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ObjectPage'
          '401':
            description: Password required but not provided or invalid
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Share not found or is a single object share
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '410':
            description: Share has been revoked, expired, or download limit reached
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /share/{token}/get:
      get:
        operationId: shareGet
        summary: Get presigned URL for object (v1.3+)
        description: Returns a redirect to a presigned URL for downloading an object. For prefix shares, requires key query parameter. For object shares, uses the stored key. Increments download counter and returns 410 if limit reached. Requires password cookie if share is password-protected.
        tags:
        - Shares
        x-basement-since: '1.3'
        security: []
        parameters:
        - name: token
          in: path
          required: true
          description: Share token
          schema:
            type: string
        - name: key
          in: query
          required: false
          description: Object key (required for prefix shares)
          schema:
            type: string
        responses:
          '302':
            description: Redirect to presigned URL
          '401':
            description: Password required but not provided or invalid
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Share not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '410':
            description: Share has been revoked, expired, or download limit reached
            content:
              application/json:
                schema:
                   $ref: '#/components/schemas/ErrorResponse'

  # User sync endpoints (v0.8.0c SYNC.ENGINE.PULL)
  /user/syncs:
      post:
        operationId: createUserSync
        summary: Create a new cross-cluster sync job (pull mode only, v0.8.0c)
        description: Creates an asynchronous sync job that copies objects from a source bucket to a destination bucket. Returns 202 Accepted immediately with the job ID; the actual sync runs asynchronously. User must have grants on both source and destination connections.
        tags:
        - Sync
        x-basement-since: '1.4'
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSyncCreateRequest'
        responses:
          '202':
            description: Sync job created and queued for processing
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Job ID (UUID).
                    state:
                      type: string
                      enum: [queued]
                      description: Initial job state.
                    message:
                      type: string
                      example: Sync job created and queued
          '400':
            description: Invalid request body or unsupported mode
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: User lacks grants on source or destination connection
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Source or destination cluster not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      get:
        operationId: listUserSyncs
        summary: List user's sync jobs
        description: Returns all sync jobs owned by the authenticated user, sorted by creation time (newest first).
        tags:
        - Sync
        x-basement-since: '1.4'
        security:
        - cookieAuth: []
        responses:
          '200':
            description: List of sync jobs
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/SyncJob'
          '401':
            description: No active session
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'

  /user/syncs/{id}:
      get:
        operationId: getUserSync
        summary: Get sync job detail and progress
        description: Returns detailed information about a specific sync job including current state, progress metrics, and any error messages.
        tags:
        - Sync
        x-basement-since: '1.4'
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Job ID (UUID)
          schema:
            type: string
        responses:
          '200':
            description: Sync job details
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/SyncJob'
          '401':
            description: No active session
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Access denied (not owner)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Sync job not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      delete:
        operationId: deleteUserSync
        summary: Delete a sync job
        description: Deletes a sync job. Only the owner can delete their own jobs. Does not cancel running syncs (they continue to completion).
        tags:
        - Sync
        x-basement-since: '1.4'
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Job ID (UUID)
          schema:
            type: string
        responses:
          '204':
            description: Sync job deleted successfully
          '401':
            description: No active session
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Access denied (not owner)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Sync job not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'

  /user/syncs/{id}/pause:
      post:
        operationId: pauseUserSync
        summary: Pause a running sync job
        description: Pauses an active sync job. The job state becomes 'paused'. Use resume to restart.
        tags:
        - Sync
        x-basement-since: '1.4'
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Job ID (UUID)
          schema:
            type: string
        responses:
          '200':
            description: Sync job paused successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    state:
                      type: string
                      enum: [paused]
          '401':
            description: No active session
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Access denied (not owner)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Sync job not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'

  /user/syncs/{id}/resume:
      post:
        operationId: resumeUserSync
        summary: Resume a paused sync job
        description: Resumes a previously paused sync job. The job state becomes 'running'. Only works for jobs in 'paused' state.
        tags:
        - Sync
        x-basement-since: '1.4'
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Job ID (UUID)
          schema:
            type: string
        responses:
          '200':
            description: Sync job resumed successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    state:
                      type: string
                      enum: [running]
          '401':
            description: No active session
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Access denied (not owner)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Sync job not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
      cookieAuth:
        type: apiKey
        in: cookie
        name: __Host-basement_session
        description: JWT session cookie issued after authentication. HttpOnly, Secure,
          SameSite=Strict.
  schemas:
      ErrorResponse:
        type: object
        required:
        - error
        properties:
          error:
            type: object
            required:
            - code
            - message
            properties:
              code:
                type: string
                example: DRIVER_UNSUPPORTED
              message:
                type: string
              details:
                type: object
                additionalProperties: true
      Connection:
        type: object
        required:
        - id
        - label
        - driver
        - config
        - owner
        - createdAt
        properties:
          id:
            type: string
            format: uuid
            description: Unique connection identifier.
          label:
            type: string
            description: Operator-set human-friendly name, unique case-insensitive.
          driver:
            type: string
            enum:
            - garage
            - garage-v1
            - aws-s3
            - minio
            description: Backend driver type.
          config:
            type: object
            additionalProperties:
              type: string
            description: Per-driver configuration map (adminUrl, adminToken, region,
              etc.).
          color:
            type: string
            description: Hex color for UI display; defaults to
          owner:
            type: string
            description: Owner of the connection (currently always "org").
          createdAt:
            type: string
            format: date-time
            description: Connection creation timestamp.
      ConnectionSpec:
        type: object
        required:
        - label
        - driver
        - config
        properties:
          label:
            type: string
            description: Operator-set human-friendly name, unique case-insensitive.
          driver:
            type: string
            enum:
            - garage
            - garage-v1
            - aws-s3
            - minio
            description: Backend driver type.
          config:
            type: object
            additionalProperties:
              type: string
            description: Per-driver configuration map; must be non-empty.
          color:
            type: string
            description: Hex color for UI display (optional).
      ConnectionUpdate:
        type: object
        properties:
          label:
            type: string
            nullable: true
            description: New label (optional, replaces existing if provided).
          driver:
            type: string
            nullable: true
            enum:
            - garage
            - garage-v1
            - aws-s3
            - minio
            description: New driver type (optional).
          config:
            type: object
            additionalProperties:
              type: string
            nullable: true
            description: New config map (optional, replaces existing if provided).
          color:
            type: string
            nullable: true
            description: New hex color (optional).
      ConnectionTestResult:
        type: object
        required:
        - ok
        properties:
          ok:
            type: boolean
            description: Whether the health check passed.
          latencyMs:
            type: integer
            description: Health check latency in milliseconds (optional).
          message:
            type: string
            description: Human-readable status message.
      AggregatedBucketsResponse:
        type: object
        required:
        - buckets
        properties:
          buckets:
            type: array
            items:
              $ref: '#/components/schemas/BucketWithConnectionId'
            description: Buckets from all connections, tagged with connectionId.
          errors:
            type: array
            items:
              $ref: '#/components/schemas/FanOutError'
            description: Errors encountered during fan-out across connections.
      AggregatedKeysResponse:
        type: object
        required:
        - keys
        properties:
          keys:
            type: array
            items:
              $ref: '#/components/schemas/KeyWithConnectionId'
            description: Keys from all connections, tagged with connectionId.
          errors:
            type: array
            items:
              $ref: '#/components/schemas/FanOutError'
            description: Errors encountered during fan-out across connections.
      BucketWithConnectionId:
        type: object
        required:
        - id
        - connectionId
        allOf:
        - $ref: '#/components/schemas/Bucket'
        properties:
          connectionId:
            type: string
            description: Connection ID this bucket belongs to.
      KeyWithConnectionId:
        type: object
        required:
        - id
        - connectionId
        allOf:
        - $ref: '#/components/schemas/Key'
        properties:
          connectionId:
            type: string
            description: Connection ID this key belongs to.
      FanOutError:
        type: object
        required:
        - connectionId
        - message
        properties:
          connectionId:
            type: string
            description: Connection that produced the error.
          message:
            type: string
            description: Error message from that connection.
      HealthReport:
        type: object
        description: Liveness probe response from basement health check.
        properties:
          status:
            type: string
            enum:
            - healthy
            - degraded
            - unavailable
            description: Overall cluster health status.
          message:
            type: string
            description: Human-readable status message.
      User:
        type: object
        required:
        - id
        - username
        - role
        - created_at
        properties:
          id:
            type: string
            format: uuid
            description: Unique user identifier.
          username:
            type: string
            description: User's login name.
          password_hash:
            type: string
            description: bcrypt hash (never returned in responses).
          role:
            type: string
            enum:
            - admin
            - user
            description: User role for RBAC checks.
          uiAdmin:
            type: boolean
            description: True if the user holds the UI-admin role (ADR-0001).
          mode:
            type: string
            enum: [user, admin, elevated]
            description: |
              ADR-0003 sudo-style session mode at the time /auth/me was
              called. May reflect a back-compat grace promotion (a
              pre-v1.2 cookie returns "admin" inside the 7-day window).
              v1.2.0b+.
          modeExpiresAt:
            type: integer
            format: int64
            description: |
              Unix seconds when the current mode reverts (USER for
              ADMIN, ADMIN for ELEVATED). 0 means "never expires at the
              mode layer" (USER, or pre-v1.2 cookies inside the grace
              window). v1.2.0b+.
          oidc_subject:
            type: string
            nullable: true
            description: OIDC subject claim if provisioned via OIDC (v1.3+).
          oidcUser:
            type: boolean
            description: |
              True when this account was provisioned via OIDC (no local
              password) so the elevation modal must use the OIDC
              challenge flow instead of the password form. v1.2.0c+.
          created_at:
            type: string
            format: date-time
            description: Account creation timestamp.
      LoginRequest:
        type: object
        required:
        - username
        - password
        properties:
          username:
            type: string
            description: Username for authentication.
          password:
            type: string
            format: password
            description: Password for authentication.
      Caps:
        type: object
        description: Driver capabilities as defined in design.md (line 212-221).
        required:
        - driver
        - layout
        - key_model
        properties:
          driver:
            type: string
            example: Garage 1.0.1
            description: Human-readable driver name and version.
          layout:
            type: string
            enum:
            - stage-apply-revert
            - atomic
            - readonly
            description: Layout modification capability. stage-apply-revert supports
              staging changes before applying; atomic applies immediately; readonly
              only reads current layout.
          quotas:
            type: boolean
            description: Whether the driver supports bucket quotas.
          bucket_aliases:
            type: boolean
            description: Whether the driver supports bucket aliases (global and per-key).
          key_model:
            type: string
            enum:
            - garage
            - iam
            - none
            description: Key model supported by the driver. garage uses Garage's native
              keys; iam supports IAM-style policies; none has no key support.
          presign:
            type: boolean
            description: Whether the driver supports presigned URLs for S3 operations.
          multipart:
            type: boolean
            description: Whether the driver supports multipart uploads.
          versioning:
            type: boolean
            description: Whether the driver supports object versioning.
      Node:
        type: object
        required:
        - id
        properties:
          id:
            type: string
            description: Unique node identifier.
          hostname:
            type: string
            description: Hostname (empty if not advertised by the cluster).
          address:
            type: string
            description: Network address (empty if not advertised).
          role:
            type: string
            enum:
            - storage
            - gateway
            - unassigned
            description: Node role in the cluster.
          zone:
            type: string
            description: Zone name for fault domain isolation.
          capacity:
            type: integer
            format: int64
            minimum: 0
            description: Capacity in bytes; absent for gateway nodes.
          tags:
            type: array
            items:
              type: string
            description: Freeform tags for node organization.
          status:
            type: string
            enum:
            - connected
            - unreachable
            - unknown
            description: Live network status of the node.
          version:
            type: string
            description: Backend daemon version (e.g. "v1.0.1").
      Layout:
        type: object
        required:
        - version
        - nodes
        properties:
          version:
            type: integer
            format: int64
            description: Layout version number (monotonically increasing).
          nodes:
            type: array
            items:
              $ref: '#/components/schemas/Node'
            description: All configured nodes with their zone/capacity/tags.
          zones:
            type: array
            items:
              type: string
            description: Zone names defined in this layout.
          staged:
            $ref: '#/components/schemas/Layout'
            nullable: true
            description: Pending uncommitted layout (present when there is a staged
              change set). Null when no changes are pending.
      LayoutChange:
        type: object
        required:
        - nodeId
        properties:
          nodeId:
            type: string
            description: ID of the node being staged.
          role:
            type: string
            enum:
            - storage
            - gateway
            - ''
            description: Optional new role. Empty string treats the node as unassigned.
          zone:
            type: string
            description: Optional new zone assignment.
          capacity:
            type: integer
            format: int64
            description: Optional new capacity in bytes.
          tags:
            type: array
            items:
              type: string
            description: Optional replacement tag list.
      LayoutDiff:
        type: object
        required:
        - current_layout
        - new_layout
        properties:
          current_layout:
            $ref: '#/components/schemas/Layout'
            description: The currently applied layout.
          new_layout:
            $ref: '#/components/schemas/Layout'
            description: The computed new layout if staged changes are applied.
      LayoutApplyRequest:
        type: object
        required:
        - version
        properties:
          version:
            type: integer
            format: int64
            minimum: 1
            description: New layout version number as a safety measure. Must be current_version
              + 1.
      Bucket:
        type: object
        required:
        - id
        - connectionId
        properties:
          id:
            type: string
            description: Unique bucket identifier (UUID or backend-native).
          connectionId:
            type: string
            description: Connection ID this bucket belongs to.
          aliases:
            type: array
            items:
              type: string
            description: Human-readable aliases. The first alias is the bucket's primary
              display name.
          quotas:
            type: object
            nullable: true
            properties:
              maxSize:
                type: integer
                format: int64
                description: Maximum total bytes; null = unlimited.
              maxObjects:
                type: integer
                format: int64
                description: Maximum object count; null = unlimited.
          created:
            type: string
            format: date-time
            description: Bucket creation timestamp (zero value if backend doesn't track
              this).
          objects:
            type: integer
            format: int64
            description: Number of objects in the bucket.
          bytes:
            type: integer
            format: int64
            description: Total size of objects in the bucket, in bytes.
          unfinishedUploads:
            type: integer
            format: int64
            description: Number of in-progress multipart uploads.
          keys:
            type: array
            items:
              $ref: '#/components/schemas/BucketKeyAccess'
            description: Access keys with permissions on this bucket. Present on GetBucket;
              omitted on ListBuckets.
      BucketSpec:
        type: object
        required:
        - alias
        properties:
          alias:
            type: string
            pattern: ^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$
            description: Global alias for the new bucket (lowercase letters, numbers,
              hyphens; 3-63 chars).
      BucketUpdate:
        type: object
        properties:
          quotas:
            $ref: '#/components/schemas/BucketQuotas'
            nullable: true
            description: New quotas (both maxSize and maxObjects must be specified or
              null together).
      BucketQuotas:
        type: object
        properties:
          max_size:
            type: integer
            format: int64
            minimum: 0
            nullable: true
            description: Maximum bucket size in bytes; null means no limit.
          max_objects:
            type: integer
            format: int64
            minimum: 0
            nullable: true
            description: Maximum number of objects; null means no limit.
      BucketKeyAccess:
        type: object
        required:
        - keyId
        - read
        - write
        - owner
        properties:
          keyId:
            type: string
            description: Access key ID (matches Key.id).
          name:
            type: string
            description: Human-friendly key name (display only).
          read:
            type: boolean
          write:
            type: boolean
          owner:
            type: boolean
      KeyBucketAccess:
        type: object
        required:
        - bucketId
        - read
        - write
        - owner
        properties:
          bucketId:
            type: string
            description: Bucket ID this access applies to.
          globalAliases:
            type: array
            items:
              type: string
            description: Global aliases for the bucket (optional).
          localAliases:
            type: array
            items:
              type: string
            description: Per-key local aliases for the bucket (optional).
          read:
            type: boolean
          write:
            type: boolean
          owner:
            type: boolean
      BucketKeyPermission:
        type: object
        required:
        - access_key_id
        - owner
        - read
        - write
        properties:
          access_key_id:
            type: string
            description: Access key ID with permissions on this bucket.
          name:
            type: string
            nullable: true
            description: Human-friendly name of the key (if known).
          owner:
            type: boolean
            description: Owner permission — full control over bucket and objects.
          read:
            type: boolean
            description: Read permission — list objects and retrieve data.
          write:
            type: boolean
            description: Write permission — upload, modify, and delete objects.
      Key:
        type: object
        required:
        - id
        - connectionId
        properties:
          id:
            type: string
            description: Access key ID.
          connectionId:
            type: string
            description: Connection ID this key belongs to.
          name:
            type: string
            description: Human-friendly name for the key.
          accessKeyId:
            type: string
            description: S3 access key ID (typically equals id).
          created:
            type: string
            format: date-time
            nullable: true
            description: Creation timestamp; nullable when backend doesn't surface it
              on list.
          allowCreateBucket:
            type: boolean
            description: Whether this key may create new buckets.
          secretAccessKey:
            type: string
            nullable: true
            description: Secret access key (only returned on CreateKey response).
          bucketsPermissions:
            type: array
            items:
              $ref: '#/components/schemas/BucketPermission'
            description: Bucket-level permissions granted to this key. Present only
              on GetKey (detail) responses, not on ListKeys.
          buckets:
            type: array
            items:
              $ref: '#/components/schemas/KeyBucketAccess'
            description: Per-key bucket access. Present on GetKey (detail), omitted
              on ListKeys. Symmetric to Bucket.keys from T2.37a.
      KeySpec:
        type: object
        properties:
          name:
            type: string
            description: Human-friendly name for the new key.
      KeyUpdate:
        type: object
        properties:
          name:
            type: string
            description: New human-friendly name for the key (optional).
          bucketsPermissions:
            type: array
            items:
              $ref: '#/components/schemas/BucketPermission'
            description: Replace the key's per-bucket permissions wholesale (optional).
      BucketPermission:
        type: object
        required:
        - bucketId
        - owner
        - read
        - write
        properties:
          bucketId:
            type: string
            description: Bucket ID this permission applies to.
          owner:
            type: boolean
            description: Owner permission on this bucket.
          read:
            type: boolean
            description: Read permission on this bucket.
          write:
            type: boolean
            description: Write permission on this bucket.
      ObjectInfo:
        type: object
        required:
        - key
        - size
        properties:
          key:
            type: string
            description: Object key within the bucket.
          size:
            type: integer
            format: int64
            minimum: 0
            description: Size of the object in bytes.
          last_modified:
            type: string
            format: date-time
            description: Object last modified timestamp.
          etag:
            type: string
            description: Entity tag for the object.
          content_type:
            type: string
            description: MIME content type of the object.
          is_dir:
            type: boolean
            description: Whether this key represents a folder (prefix).
      ObjectPage:
        type: object
        required:
        - objects
        properties:
          objects:
            type: array
            items:
              $ref: '#/components/schemas/ObjectInfo'
            description: List of objects matching the request.
          nextContinuation:
            type: string
            nullable: true
            description: Token for fetching the next page of results (null if last page).
          isTruncated:
            type: boolean
            description: Whether there are more results available.
          prefixes:
            type: array
            items:
              type: string
            description: List of folder prefixes (for hierarchical navigation).
      Grant:
        type: object
        required:
        - user_id
        - bucket
        - permissions
        properties:
          id:
            type: string
            format: uuid
            nullable: true
            description: Grant identifier (server-generated on create).
          user_id:
            type: string
            format: uuid
            description: User ID this grant applies to.
          bucket:
            type: string
            description: Bucket ID or global alias for scoped access.
          prefix:
            type: string
            nullable: true
            description: Optional prefix within the bucket (e.g., "family/photos/").
              Empty means full bucket access. Longest-prefix-wins matching at request
              time.
          permissions:
            type: array
            items:
              type: string
              enum:
              - list
              - read
              - write
              - delete
              - share
            description: Subset of permissions granted to the user for this scope.
      UserCreate:
        type: object
        required:
        - username
        - password
        - role
        properties:
          username:
            type: string
            description: Desired username (will be validated for uniqueness).
          password:
            type: string
            format: password
            description: Password to hash with bcrypt. Must meet complexity requirements.
          role:
            type: string
            enum:
            - admin
            - user
            description: Initial role for the user.
      UserUpdate:
        type: object
        properties:
          username:
            type: string
            nullable: true
            description: New username (must be unique). If null, no change.
          password:
            type: string
            format: password
            nullable: true
            description: New password to hash with bcrypt. If provided, rotates the
              user's password.
          role:
            type: string
            enum:
            - admin
            - user
            nullable: true
            description: New role. Admins can demote others but not themselves.
      Share:
        type: object
        required:
        - token
        - ownerUserId
        - connectionId
        - bucketId
        - createdAt
        properties:
          token:
            type: string
            description: 128-bit share token (public URL suffix).
          ownerUserId:
            type: string
            format: uuid
            description: User ID who created this share.
          connectionId:
            type: string
            format: uuid
            description: Connection/cluster ID containing the shared bucket.
          bucketId:
            type: string
            format: uuid
            description: Bucket ID being shared from.
          prefix:
            type: string
            nullable: true
            description: Prefix (folder path) if sharing a folder; mutually exclusive
              with key.
          key:
            type: string
            nullable: true
            description: Single object key if sharing one file; mutually exclusive with
              prefix.
          expiresAt:
            type: string
            format: date-time
            nullable: true
            description: Expiration timestamp for this share link (ISO 8601).
          passwordHash:
            type: string
            nullable: true
            description: Bcrypt hash of optional password protection.
          downloadLimit:
            type: integer
            minimum: 1
            nullable: true
            description: Maximum downloads allowed before link expires.
          downloadsUsed:
            type: integer
            default: 0
            description: Number of times the share has been downloaded.
          revoked:
            type: boolean
            default: false
            description: Whether this share has been revoked.
          createdAt:
            type: string
            format: date-time
            description: Share creation timestamp (ISO 8601).
          bucketAlias:
            type: string
            nullable: true
            description: Bucket alias or ID for display purposes.
          path:
            type: string
            nullable: true
            description: Display path - either prefix or key depending on share type.
      ShareCreateRequest:
        type: object
        properties:
          connectionId:
            type: string
            format: uuid
            description: Connection ID for the cluster containing the bucket.
          bucketId:
            type: string
            format: uuid
            description: Bucket ID to share from.
          prefix:
            type: string
            nullable: true
            description: Prefix (folder path) to share; mutually exclusive with key.
          key:
            type: string
            nullable: true
            description: Single object key to share; mutually exclusive with prefix.
          expiresAt:
            type: string
            format: date-time
            nullable: true
            description: Expiration timestamp for the share link (ISO 8601).
          downloadLimit:
            type: integer
            minimum: 1
            nullable: true
            description: Maximum number of downloads allowed before the link expires.
          password:
            type: string
            format: password
            nullable: true
            description: Optional password to protect the share link (min 8 characters).
      ShareInfoResponse:
        type: object
        required:
        - requiresPassword
        - expired
        - revoked
        - isDirectory
        properties:
          requiresPassword:
            type: boolean
            description: Whether this share requires a password.
          expired:
            type: boolean
            description: Whether the share has expired.
          revoked:
            type: boolean
            description: Whether the share has been revoked.
          isDirectory:
            type: boolean
            description: Whether this is a prefix (directory) share rather than single object.
          displayName:
            type: string
            nullable: true
            description: Human-readable name for display — either prefix or extracted filename from key.
      ShareAuthRequest:
        type: object
        properties:
          password:
            type: string
            format: password
            description: Password for the share.
      CreateMultipartRequest:
        type: object
        required:
        - key
        - contentType
        properties:
          key:
            type: string
            description: Object key for the multipart upload.
          contentType:
            type: string
            description: MIME content type of the object being uploaded.
      PresignRequest:
        type: object
        required:
        - ttl
        properties:
          ttl:
            type: integer
            format: int64
            minimum: 60
            maximum: 86400
            default: 300
            description: Time-to-live in seconds (default 300, min 60, max 86400).
          contentType:
            type: string
            nullable: true
            description: MIME content type (only required for presign-put requests).
      PresignedURL:
        type: object
        required:
        - url
        - expires
        - method
        properties:
          url:
            type: string
            format: uri
            description: The presigned URL that can be used for direct access.
          expires:
            type: string
            format: date-time
            description: Timestamp when the URL expires (RFC 3339 date-time).
          method:
            type: string
            enum:
            - GET
            - PUT
            - POST
            - DELETE
            description: HTTP method for which this URL is valid.
      MultipartUpload:
        type: object
        required:
        - uploadId
        - bucket
        - key
        properties:
          uploadId:
            type: string
            description: Unique multipart upload identifier.
          bucket:
            type: string
            description: Bucket containing the upload.
          key:
            type: string
            description: Object key being uploaded via multipart.
          contentType:
            type: string
            nullable: true
            description: MIME content type of the object (optional).
          created:
            type: string
            format: date-time
            description: Upload creation timestamp (RFC 3339 date-time).
      MultipartPartRequest:
        type: object
        required:
        - partNumber
        properties:
          partNumber:
            type: integer
            minimum: 1
            maximum: 10000
            description: Part number (must be between 1 and 10000, inclusive).
      MultipartPartResponse:
        type: object
        required:
        - url
        - expires
        - partNumber
        properties:
          url:
            type: string
            format: uri
            description: Presigned PUT URL for uploading this specific part.
          expires:
            type: string
            format: date-time
            description: Timestamp when the URL expires (RFC 3339 date-time).
          partNumber:
            type: integer
            minimum: 1
            maximum: 10000
            description: Part number for which this URL is valid.
      CompleteMultipartRequest:
        type: object
        required:
        - parts
        properties:
          parts:
            type: array
            items:
              type: object
              required:
              - partNumber
              - etag
              properties:
                partNumber:
                  type: integer
                  minimum: 1
                  maximum: 10000
                  description: Part number (must match the uploaded part).
                etag:
                  type: string
                  description: ETag returned by the storage service after part upload.
      SyncJob:
        type: object
        required:
        - id
        - ownerUserId
        - mode
        - srcConnectionId
        - srcBucket
        - dstConnectionId
        - dstBucket
        - createdAt
        - state
        - progress
        properties:
          id:
            type: string
            description: Unique job identifier (UUID).
          ownerUserId:
            type: string
            description: User ID that owns this sync job.
          mode:
            type: string
            enum:
            - pull
            - push
            - two-way
            description: Sync mode. v0.8.0c supports only 'pull'.
          srcConnectionId:
            type: string
            description: Source cluster/connection ID.
          srcBucket:
            type: string
            description: Source bucket name.
          srcPrefix:
            type: string
            nullable: true
            description: Optional source prefix for partial sync.
          dstConnectionId:
            type: string
            description: Destination cluster/connection ID.
          dstBucket:
            type: string
            description: Destination bucket name.
          dstPrefix:
            type: string
            nullable: true
            description: Optional destination prefix mapping.
          createdAt:
            type: string
            format: date-time
            description: Job creation timestamp (RFC 3339).
          state:
            type: string
            enum:
            - queued
            - running
            - paused
            - done
            - error
            description: Current job state.
          progress:
            $ref: '#/components/schemas/SyncProgress'
          lastError:
            type: string
            nullable: true
            description: Error message if state is 'error'.
      SyncProgress:
        type: object
        required:
        - objectsTotal
        - objectsCopied
        - bytesTotal
        - bytesCopied
        properties:
          objectsTotal:
            type: integer
            minimum: 0
            description: Total number of objects to sync.
          objectsCopied:
            type: integer
            minimum: 0
            description: Number of objects successfully copied.
          bytesTotal:
            type: integer
            minimum: 0
            description: Total bytes to copy.
          bytesCopied:
            type: integer
            minimum: 0
            description: Bytes successfully copied.
          startedAt:
            type: string
            format: date-time
            nullable: true
            description: When the sync started (RFC 3339).
          finishedAt:
            type: string
            format: date-time
            nullable: true
            description: When the sync completed (RFC 3339).
      UserSyncCreateRequest:
        type: object
        required:
        - mode
        - srcConnectionId
        - srcBucket
        - dstConnectionId
        - dstBucket
        properties:
          mode:
            type: string
            enum:
            - pull
            - push
