            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Bucket not found or connection not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
