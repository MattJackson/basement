  /auth/elevate:
      post:
        operationId: elevateSession
        summary: Sudo-style mode elevation (ADR-0003)
        description: |
          Re-authenticate to bump the current session's mode from USER to
          ADMIN (15min TTL) or from ADMIN to ELEVATED (5min TTL). On
          success, mints a fresh __Host-basement_session cookie with the
          new mode + mode_expires_at claims and returns the granted
          mode + expiry in the body so the frontend can drive its
          countdown chip without parsing the cookie.

          USER → ELEVATED directly is rejected (400 INVALID_TARGET_MODE);
          callers must elevate to ADMIN first. OIDC-only users get
          403 OIDC_USER_ELEVATION_NOT_SUPPORTED — v1.2.0c wires the
          OIDC `prompt=login` challenge for them.
        tags:
        - Auth
        x-basement-since: '1.2.0a'
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                - password
                - target_mode
                properties:
                  password:
                    type: string
                  target_mode:
                    type: string
                    enum: [admin, elevated]
        responses:
          '200':
            description: |
              Elevation successful (mode/mode_expires_at/mode_ttl_seconds set
              + cookie re-issued) OR the dispatcher pivoted an OIDC-only user
              into the OIDC flow (requires_oidc=true + start_url; no cookie
              issued yet — FE POSTs start_url to begin the OIDC challenge).
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: [admin, elevated]
                    mode_expires_at:
                      type: integer
                      format: int64
                      description: Unix seconds when the mode reverts.
                    mode_ttl_seconds:
                      type: integer
                      format: int64
                    requires_oidc:
                      type: boolean
                      description: |
                        v1.2.0c: true when the dispatcher detected an
                        OIDC-only user. The FE should POST to start_url to
                        begin the OIDC step-up challenge instead of
                        treating this as an error.
                    start_url:
                      type: string
                      description: |
                        v1.2.0c: relative path the FE POSTs to begin the
                        OIDC step-up. Always /api/v1/auth/elevate/oidc/start.
          '400':
            description: INVALID_TARGET_MODE / INVALID_JSON
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: INVALID_PASSWORD / UNAUTHORIZED
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: OIDC_USER_ELEVATION_NOT_SUPPORTED
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '503':
            description: OIDC_NOT_CONFIGURED (OIDC-only user but server has no OIDC provider)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /auth/elevate/oidc/start:
      post:
        operationId: elevateOIDCStart
        summary: Begin OIDC step-up elevation (ADR-0003)
        description: |
          For OIDC-only users (no local password): mints a short-lived
          state token + returns the IdP's authorize URL with
          `prompt=login` (configurable via BASEMENT_OIDC_ELEVATION_PROMPT)
          and `max_age=0` so the IdP forces a FRESH re-authentication
          even if it has a cached session. The FE is expected to
          window.location.href to the returned redirect_url; the
          callback handler completes the elevation server-side.
        tags:
        - Auth
        x-basement-since: '1.2.0c'
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                - target_mode
                properties:
                  target_mode:
                    type: string
                    enum: [admin, elevated]
        responses:
          '200':
            description: Elevation flow started; FE must navigate to redirect_url.
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    redirect_url:
                      type: string
                      format: uri
          '400':
            description: INVALID_TARGET_MODE / INVALID_JSON
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: UNAUTHORIZED
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '503':
            description: OIDC_NOT_CONFIGURED
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /auth/elevate/oidc/callback:
      get:
        operationId: elevateOIDCCallback
        summary: OIDC step-up elevation callback (ADR-0003)
        description: |
          Handles the IdP redirect back after a step-up auth. Validates
          state (CSRF + retrieves target_mode), exchanges the code,
          verifies the ID token, checks `auth_time` is within 60s
          (proves fresh login — protects against IdPs that ignore
          prompt=login + max_age=0), mints the elevated cookie, then
          302s the browser to `/?elevated=<mode>` so the FE pops a
          success toast and closes any modal.
        tags:
        - Auth
        x-basement-since: '1.2.0c'
        security:
        - cookieAuth: []
        parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
        responses:
          '302':
            description: Elevation succeeded; cookie re-issued with bumped mode.
            headers:
              Location:
                schema:
                  type: string
              Set-Cookie:
                schema:
                  type: string
          '400':
            description: OIDC_STATE_MISSING / OIDC_STATE_INVALID / OIDC_CODE_MISSING / OIDC_EXCHANGE_FAILED / OIDC_ID_TOKEN_INVALID
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: OIDC_AUTH_TIME_STALE (IdP returned a cached session)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '503':
            description: OIDC_NOT_CONFIGURED
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /auth/logout-elevation:
      post:
        operationId: dropPrivileges
        summary: Drop sudo-style privileges back to USER (ADR-0003)
        description: |
          Re-issues the session cookie with mode=user, modeExpiresAt=0.
          The session itself stays valid (user id, role, uiAdmin, outer
          session TTL preserved); only the elevation state collapses.
          Wired to the "drop privileges" button next to the persona
          pill countdown in the v1.2.0b frontend.
        tags:
        - Auth
        x-basement-since: '1.2.0b'
        security:
        - cookieAuth: []
        responses:
          '200':
            description: Privileges dropped; cookie re-issued at USER mode
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: [user]
                    mode_expires_at:
                      type: integer
                      format: int64
          '401':
            description: UNAUTHORIZED — no active session
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /auth/oidc/callback:
      get:
        operationId: oidcCallback
        summary: OIDC authorization-code callback
        description: 'Callback endpoint hit by the browser after the OIDC provider redirects
          back

          from the authorization endpoint. Validates the `state` parameter against the

          `__Host-basement_oidc_state` cookie (CSRF guard), exchanges the `code` for
          an

          OAuth2 token, verifies the ID token''s signature, audience, expiry, and nonce,

          looks up the user by (provider, subject), and — on success — issues the

          session JWT cookie and 302s to `/`.

          '
        tags:
        - Auth
        x-basement-since: '0.5'
        parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: Opaque state token; must equal the value stored in the state
            cookie.
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code returned by the OIDC provider.
        responses:
          '302':
            description: Authentication succeeded; session cookie set; browser redirected
              to `/`.
            headers:
              Location:
                schema:
                  type: string
                  format: uri
              Set-Cookie:
                schema:
                  type: string
          '400':
            description: Missing/mismatched state, missing code, exchange failed, or
              ID token invalid.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: User not provisioned and `BASEMENT_OIDC_AUTO_PROVISION=false`.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '501':
            description: OIDC is not configured on this server (BASEMENT_OIDC_ISSUER
              unset).
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /auth/oidc/start:
      get:
        operationId: startOIDC
        summary: Begin OIDC authorization-code flow
        description: 'Generates a fresh `state` and `nonce`, stores them in the short-lived

          `__Host-basement_oidc_state` cookie (HttpOnly, Secure, SameSite=Lax, 5 min
          TTL),

          and 302-redirects the browser to the configured OIDC provider''s authorization

          endpoint with `openid profile email` scopes.

          '
        tags:
        - Auth
        x-basement-since: '0.5'
        responses:
          '302':
            description: Redirect to the OIDC provider's authorization endpoint.
            headers:
              Location:
                schema:
                  type: string
                  format: uri
              Set-Cookie:
                schema:
                  type: string
          '501':
            description: OIDC is not configured on this server (BASEMENT_OIDC_ISSUER
              unset).
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
