          srcConnectionId:
            type: string
            description: Source cluster/connection ID.
          srcBucket:
            type: string
            description: Source bucket name.
          srcPrefix:
            type: string
            nullable: true
            description: Optional source prefix for partial sync.
          dstConnectionId:
            type: string
            description: Destination cluster/connection ID.
          dstBucket:
            type: string
            description: Destination bucket name.
          dstPrefix:
            type: string
            nullable: true
            description: Optional destination prefix mapping.
      CreateSyncResponse:
        type: object
        required:
        - id
        - state
        properties:
          id:
            type: string
            description: Job ID (UUID).
          state:
            type: string
            enum: [queued]
            description: Initial job state.
          message:
            type: string
            example: Sync job created and queued
