openapi: 3.1.0
info:
  title: basement API
  version: 0.1.0
  description: 'Public OSS contract for basement''s API surface — the interface
      between

      the React frontend and Go backend. Frontend types are generated from this

      spec via openapi-typescript; backend handlers implement against it.


      **Versioning:** This is a 0.x spec (allowed to break). Contract freezes at

      version 1.0.0 when basement reaches feature-complete admin scope.

      '
  license:
      name: MIT
  contact:
      email: noreply@example.com
servers:
- url: http://localhost:8080/api/v1
  description: Local development server
tags:
- name: Auth
  description: Authentication and session management
- name: Capabilities
  description: Driver capabilities and feature flags
- name: AdminCluster
  description: Cluster status, nodes, and layout management
- name: AdminBuckets
  description: Bucket CRUD operations
- name: AdminKeys
  description: Access key CRUD and permissions
- name: AdminUsers
  description: User management and grants (v1.1+)
- name: DataPlane
  description: S3 object data plane operations
- name: Shares
  description: Share link creation and management (v1.2+)
- name: User
  description: User persona endpoints — clusters, buckets, keys, objects
- name: Sync
  description: Cross-cluster sync job management (v0.8.0c)
paths:
  /admin/buckets:
      get:
        operationId: listBuckets
        summary: List all buckets
        description: Returns all storage buckets in the cluster with their ID, global
          aliases, and summary statistics (object count, size). Used by Buckets — list
          screen.
        tags:
        - AdminBuckets
        security:
        - cookieAuth: []
        responses:
          '200':
            description: List of buckets
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Bucket'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      post:
        operationId: createBucket
        summary: Create a new bucket
        description: Creates a new storage bucket with the specified global alias (required)
          and optional quotas. Returns the created bucket with its ID and initial statistics.
          Used by Buckets — list screen "Create bucket" action.
        tags:
        - AdminBuckets
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketSpec'
        responses:
          '201':
            description: Bucket created successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Bucket'
          '400':
            description: Invalid bucket specification (e.g., alias format)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '409':
            description: Bucket with this global alias already exists
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/buckets/{id}:
      get:
        operationId: getBucket
        summary: Get bucket details
        description: Returns exhaustive information about a specific bucket including
          aliases, key permissions grid, statistics (objects, size), quotas, and multipart
          upload state. Used by Buckets — detail screen tabs (Overview, Keys & Permissions).
        tags:
        - AdminBuckets
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Bucket ID or global alias
          schema:
            type: string
        responses:
          '200':
            description: Bucket details with permissions and statistics
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Bucket'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Bucket not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      patch:
        operationId: updateBucket
        summary: Update bucket configuration
        description: Updates optional fields on an existing bucket including quotas
          (maxSize, maxObjects) and website access configuration. All fields are optional;
          absent values are treated as null. Used by Buckets — detail screen Settings
          tab.
        tags:
        - AdminBuckets
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Bucket ID or global alias
          schema:
            type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketUpdate'
        responses:
          '200':
            description: Bucket updated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Bucket'
          '400':
            description: Invalid update specification (e.g., quota format)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Bucket not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      delete:
        operationId: deleteBucket
        summary: Delete a bucket (token-confirmed)
        description: 'Deletes a storage bucket and all its associated data. Fails

          if the bucket is not empty (zero objects). Also deletes all

          aliases (global and per-key) associated with the bucket.


          **Two-phase confirmation:** the client must first POST to

          `/admin/buckets/{id}/_arm-delete` to receive a short-lived

          (60s) HMAC-bound token, then send the token as the

          `X-Confirm-Delete` request header on this DELETE. The token

          is bound to the (bucket id, requesting user) pair, so a token

          armed for one bucket cannot be used to delete another, and a

          leaked URL alone cannot destroy.

          '
        tags:
        - AdminBuckets
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Bucket ID or global alias to delete
          schema:
            type: string
        - name: X-Confirm-Delete
          in: header
          required: true
          description: HMAC-bound confirmation token obtained from POST /admin/buckets/{id}/_arm-delete.
          schema:
            type: string
        responses:
          '200':
            description: Bucket deleted successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Bucket deleted
          '400':
            description: 'X-Confirm-Delete header missing (`CONFIRMATION_REQUIRED`),

              malformed/expired (`CONFIRMATION_INVALID`), or bound to a

              different bucket/user (`CONFIRMATION_MISMATCH`).

              '
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Bucket not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/buckets/{id}/_arm-delete:
      post:
        operationId: armDeleteBucket
        summary: Arm a bucket deletion (returns short-lived confirm token)
        description: 'First phase of basement''s two-phase delete pattern. Returns

          a 60-second HMAC token bound to the (bucket id, requesting

          user) pair. The client passes this token as the

          `X-Confirm-Delete` request header on the matching DELETE.


          Verifies the bucket exists; returns 404 otherwise. Token is

          stateless (server stores nothing); revocation = expiry only.

          '
        tags:
        - AdminBuckets
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Bucket ID or global alias to arm for deletion
          schema:
            type: string
        responses:
          '200':
            description: Arm token issued
            content:
              application/json:
                schema:
                  type: object
                  required:
                  - token
                  - expiresInSeconds
                  properties:
                    token:
                      type: string
                      description: Opaque token to pass via X-Confirm-Delete header
                        on the matching DELETE.
                    expiresInSeconds:
                      type: integer
                      description: Seconds remaining before token expires (typically
                        60).
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Bucket not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/keys:
      get:
        operationId: listKeys
        summary: List all access keys
        description: Returns all API access keys in the cluster with their ID, human-friendly
          name, and bucket permissions summary. Used by Keys — list screen.
        tags:
        - AdminKeys
        security:
        - cookieAuth: []
        responses:
          '200':
            description: List of API access keys
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Key'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      post:
        operationId: createKey
        summary: Create a new access key
        description: Creates a new API access key with an optional name. Returns the
          newly created key including its secretAccessKey (shown ONCE only — UI must
          provide copy/download UX). Used by Keys — list screen "Create key" action.
        tags:
        - AdminKeys
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeySpec'
        responses:
          '201':
            description: Key created successfully with secret
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Key'
          '400':
            description: Invalid key specification
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/keys/{id}:
      get:
        operationId: getKey
        summary: Get access key details
        description: Returns detailed information about an API access key including
          its ID, name, and full bucket permissions grid. Secret key is NOT returned
          by default; requires showSecretKey query parameter for security. Used by Keys
          — detail screen Overview tab.
        tags:
        - AdminKeys
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Access key ID
          schema:
            type: string
        - name: showSecretKey
          in: query
          description: Whether to include the secret access key (requires confirmation)
          required: false
          schema:
            type: boolean
            default: false
        responses:
          '200':
            description: Key details with optional secret
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Key'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Key not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      patch:
        operationId: updateKey
        summary: Update access key metadata
        description: Updates the human-friendly name of an API access key. Secret key
          rotation is not supported via this endpoint — delete and recreate to rotate.
          Used by Keys — detail screen Overview tab inline edit.
        tags:
        - AdminKeys
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Access key ID to update
          schema:
            type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyUpdate'
        responses:
          '200':
            description: Key metadata updated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Key'
          '400':
            description: Invalid update specification (e.g., empty name)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Key not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      delete:
        operationId: deleteKey
        summary: Delete an access key (token-confirmed)
        description: 'Deletes an API access key from the cluster. Access is removed
          from all buckets; those

          bucket permissions become dangling (user must manually clean up). Used by
          Keys — detail screen

          Danger zone.


          **Two-phase confirmation:** the client must first POST to

          `/admin/keys/{id}/_arm-delete` to receive a short-lived

          (60s) HMAC-bound token, then send the token as the

          `X-Confirm-Delete` request header on this DELETE. The token

          is bound to the (key id, requesting user) pair, so a token

          armed for one key cannot be used to delete another, and a

          leaked URL alone cannot destroy.

          '
        tags:
        - AdminKeys
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Access key ID to delete
          schema:
            type: string
        - name: X-Confirm-Delete
          in: header
          required: true
          description: HMAC-bound confirmation token obtained from POST /admin/keys/{id}/_arm-delete.
          schema:
            type: string
        responses:
          '200':
            description: Key deleted successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Access key deleted
          '400':
            description: 'X-Confirm-Delete header missing (`CONFIRMATION_REQUIRED`),

              malformed/expired (`CONFIRMATION_INVALID`), or bound to a

              different key/user (`CONFIRMATION_MISMATCH`).

              '
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Key not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/keys/{id}/_arm-delete:
      post:
        operationId: armDeleteKey
        summary: Arm a key deletion (returns short-lived confirm token)
        description: 'First phase of basement''s two-phase delete pattern. Returns

          a 60-second HMAC token bound to the (key id, requesting

          user) pair. The client passes this token as the

          `X-Confirm-Delete` request header on the matching DELETE.


          Verifies the key exists; returns 404 otherwise. Token is

          stateless (server stores nothing); revocation = expiry only.

          '
        tags:
        - AdminKeys
        security:
        - cookieAuth: []
        parameters:
        - name: id
          in: path
          required: true
          description: Access key ID to arm for deletion
          schema:
            type: string
        responses:
          '200':
            description: Arm token issued
            content:
              application/json:
                schema:
                  type: object
                  required:
                  - token
                  - expiresInSeconds
                  properties:
                    token:
                      type: string
                      description: Opaque token to pass via X-Confirm-Delete header
                        on the matching DELETE.
                    expiresInSeconds:
                      type: integer
                      description: Seconds remaining before token expires (typically
                        60).
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Key not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/layout:
      get:
        operationId: getLayout
        summary: Get current cluster layout
        description: Returns the currently applied cluster layout including all nodes
          with their zone, capacity (bytes), and tags. Also includes any staged changes
          that have not yet been applied. Used by Cluster — Layout editor screen.
        tags:
        - AdminCluster
        security:
        - cookieAuth: []
        responses:
          '200':
            description: Current cluster layout with optional staged changes
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Layout'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/layout/apply:
      post:
        operationId: applyLayoutChange
        summary: Apply staged layout changes
        description: Commits the currently staged layout changes to the cluster. Requires
          version assertion as a safety measure — the new layout version number must
          be specified. Returns statistics about partition redistribution. Used by Cluster
          — Layout editor screen after diff review.
        tags:
        - AdminCluster
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutApplyRequest'
        responses:
          '200':
            description: Layout applied successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Layout'
          '409':
            description: Version mismatch — layout changed by another admin while editing
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/layout/revert:
      post:
        operationId: revertLayoutChange
        summary: Discard staged layout changes
        description: Clears all staged layout changes without applying them. Restores
          the layout editor to match the currently applied version. Used by Cluster
          — Layout editor screen when user decides not to apply modifications.
        tags:
        - AdminCluster
        security:
        - cookieAuth: []
        responses:
          '200':
            description: Staged changes discarded successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Staged layout changes discarded
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/layout/stage:
      post:
        operationId: stageLayoutChange
        summary: Stage layout modifications
        description: Computes a new layout version taking into account the provided
          changes (node additions, updates, or removals). Does not apply the change
          yet; returns a diff that can be previewed by the UI. Staged changes persist
          until applied or reverted. Used by Cluster — Layout editor screen.
        tags:
        - AdminCluster
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutChange'
        responses:
          '200':
            description: Layout diff computed successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/LayoutDiff'
          '400':
            description: Invalid layout change specification
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/nodes:
      get:
        operationId: listNodes
        summary: List all cluster nodes
        description: Returns all storage and gateway nodes registered in the cluster
          layout, including their current connection state (live/dead), zone assignment,
          capacity, and tags. Used by Dashboard and Cluster — Nodes screens.
        tags:
        - AdminCluster
        security:
        - cookieAuth: []
        responses:
          '200':
            description: List of cluster nodes
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Node'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/clusters:
      get:
        operationId: listClusters
        summary: List all connections
        description: Returns all storage backend connections configured in the system.
          Each connection represents a distinct Garage or S3 cluster with its own driver
          instance. Used by Admin — Connections screen list view.
        tags:
        - Clusters
        security:
        - cookieAuth: []
        responses:
          '200':
            description: List of connections
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Connection'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      post:
        operationId: createCluster
        summary: Create a new connection
        description: Creates a new storage backend connection (Garage cluster or S3
          bucket). Requires label, driver type, and configuration map. Used by Admin
          — Connections screen "Create connection" action.
        tags:
        - Clusters
        security:
        - cookieAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionSpec'
        responses:
          '201':
            description: Connection created successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Connection'
          '400':
            description: Invalid connection specification (e.g., unsupported driver,
              empty config)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '409':
            description: Connection with this label already exists (case-insensitive)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/clusters/{cid}:
      get:
        operationId: getCluster
        summary: Get connection details
        description: Returns exhaustive information about a specific connection including
          its driver type, configuration, and creation timestamp. Used by Admin — Connections
          screen detail view.
        tags:
        - Clusters
        security:
        - cookieAuth: []
        parameters:
        - name: cid
          in: path
          required: true
          description: Connection ID
          schema:
            type: string
        responses:
          '200':
            description: Connection details
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Connection'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Connection not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      patch:
        operationId: updateCluster
        summary: Update connection configuration
        description: Updates optional fields on an existing connection including label,
          driver type, config map, and color. All fields are optional; absent values
          are treated as null. Used by Admin — Connections screen edit form.
        tags:
        - Clusters
        security:
        - cookieAuth: []
        parameters:
        - name: cid
          in: path
          required: true
          description: Connection ID to update
          schema:
            type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionUpdate'
        responses:
          '200':
            description: Connection updated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Connection'
          '400':
            description: Invalid update specification (e.g., unsupported driver)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Connection not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      delete:
        operationId: deleteCluster
        summary: Delete a connection (token-confirmed)
        description: 'Deletes a storage backend connection. All buckets and keys within
          that

          cluster remain but become inaccessible until reassigned to another

          connection.


          **Two-phase confirmation:** the client must first POST to

          `/admin/clusters/{cid}/_arm-delete` to receive a short-lived

          (60s) HMAC-bound token, then send the token as the

          `X-Confirm-Delete` request header on this DELETE. The token

          is bound to the (connection id, requesting user) pair, so a token

          armed for one connection cannot be used to delete another, and a

          leaked URL alone cannot destroy.

          '
        tags:
        - Clusters
        security:
        - cookieAuth: []
        parameters:
        - name: cid
          in: path
          required: true
          description: Connection ID to delete
          schema:
            type: string
        - name: X-Confirm-Delete
          in: header
          required: true
          description: HMAC-bound confirmation token obtained from POST /admin/clusters/{cid}/_arm-delete.
          schema:
            type: string
        responses:
          '200':
            description: Connection deleted successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Cluster deleted
          '400':
            description: 'X-Confirm-Delete header missing (`CONFIRMATION_REQUIRED`),

              malformed/expired (`CONFIRMATION_INVALID`), or bound to a

              different connection/user (`CONFIRMATION_MISMATCH`).

              '
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: No active session or insufficient role
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '404':
            description: Connection not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  /admin/clusters/{cid}/_arm-delete:
      post:
